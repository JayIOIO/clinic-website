<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Announcements | Modern Clinic</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .page-header {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('https://images.unsplash.com/photo-1504462385559-c4e560cb19b7?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 0;
            text-align: center;
        }
        .news-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            gap: 20px;
            flex-wrap: wrap;
        }
        .search-box {
            flex-grow: 1;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
        }
        .filter-box select {
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
        }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .news-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        .news-content {
            padding: 25px;
        }
        .news-category {
            background: var(--medical-blue);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .news-date {
            font-size: 14px;
            color: var(--gray-500);
            margin-bottom: 10px;
            display: block;
        }
        .news-title {
            font-size: 20px;
            margin-bottom: 15px;
            color: var(--dark-blue);
        }
        body.dark-mode .news-title { color: white; }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo"><span>🏥</span> ModernClinic</a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="doctors.html">Doctors</a></li>
                    <li><a href="news.html" class="active">News</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <span class="theme-toggle">🌙</span>
                    <a href="appointments.html" class="btn btn-primary">Book Now</a>
                    <span class="mobile-menu-btn">☰</span>
                </div>
            </nav>
        </div>
    </header>

    <div class="page-header">
        <div class="container">
            <h1>News & Announcements</h1>
            <p>Stay updated with the latest health news and clinic updates.</p>
        </div>
    </div>

    <section class="news-section">
        <div class="container">
            <div class="news-controls">
                <div class="search-box">
                    <input type="text" id="news-search" placeholder="Search news...">
                </div>
                <div class="filter-box">
                    <select id="news-filter">
                        <option value="all">All Categories</option>
                        <option value="Health">Health</option>
                        <option value="Announcement">Announcement</option>
                        <option value="Event">Event</option>
                    </select>
                </div>
            </div>

            <div class="news-grid" id="news-list">
                <!-- Loaded via JS -->
            </div>
        </div>
    </section>

    <!-- News Modal -->
    <div class="modal" id="news-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Modern Clinic. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const newsList = document.getElementById('news-list');
            const searchInput = document.getElementById('news-search');
            const filterSelect = document.getElementById('news-filter');
            const modal = document.getElementById('news-modal');
            const modalBody = document.getElementById('modal-body');
            const closeModal = document.querySelector('.close-modal');

            const allNews = Storage.get(STORAGE_KEYS.NEWS);

            function renderNews(items) {
                if (items.length === 0) {
                    newsList.innerHTML = '<p class="text-center" style="grid-column: 1/-1;">No news found.</p>';
                    return;
                }

                newsList.innerHTML = items.map(news => `
                    <div class="news-card" data-reveal="bottom">
                        <div class="news-content">
                            <span class="news-category">${news.category}</span>
                            <span class="news-date">${new Date(news.date).toLocaleDateString()}</span>
                            <h3 class="news-title">${news.title}</h3>
                            <p>${news.content.substring(0, 100)}...</p>
                            <button class="btn btn-outline read-more" data-id="${news.id}" style="margin-top: 20px;">Read More</button>
                        </div>
                    </div>
                `).join('');
                
                initScrollReveal();

                // Add event listeners to Read More buttons
                document.querySelectorAll('.read-more').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.getAttribute('data-id');
                        const item = allNews.find(n => n.id == id);
                        if (item) {
                            modalBody.innerHTML = `
                                <span class="news-category">${item.category}</span>
                                <h2 style="margin: 15px 0;">${item.title}</h2>
                                <p style="color: var(--gray-500); margin-bottom: 20px;">${new Date(item.date).toLocaleDateString()}</p>
                                <div style="line-height: 1.8;">${item.content}</div>
                            `;
                            modal.style.display = 'flex';
                        }
                    });
                });
            }

            function filterNews() {
                const searchTerm = searchInput.value.toLowerCase();
                const category = filterSelect.value;

                const filtered = allNews.filter(news => {
                    const matchesSearch = news.title.toLowerCase().includes(searchTerm) || 
                                         news.content.toLowerCase().includes(searchTerm);
                    const matchesCategory = category === 'all' || news.category === category;
                    return matchesSearch && matchesCategory;
                });

                renderNews(filtered);
            }

            searchInput.addEventListener('input', filterNews);
            filterSelect.addEventListener('change', filterNews);
            
            closeModal.addEventListener('click', () => modal.style.display = 'none');
            window.addEventListener('click', (e) => {
                if (e.target === modal) modal.style.display = 'none';
            });

            renderNews(allNews);
        });
    </script>
</body>
</html>

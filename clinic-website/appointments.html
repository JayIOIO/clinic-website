<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Modern Clinic</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .appointment-container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            background: var(--light-gray);
            color: var(--text-color);
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--medical-blue);
        }
        .error-msg {
            color: #ef4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo"><span>🏥</span> ModernClinic</a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="doctors.html">Doctors</a></li>
                    <li><a href="news.html">News</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <span class="theme-toggle">🌙</span>
                    <span class="mobile-menu-btn">☰</span>
                </div>
            </nav>
        </div>
    </header>

    <section class="appointment-section">
        <div class="container">
            <div class="text-center mb-40">
                <h2 class="section-title">Book an Appointment</h2>
                <p class="section-subtitle">Fill out the form below and we'll confirm your appointment shortly.</p>
            </div>

            <div class="appointment-container" data-reveal="bottom">
                <form id="appointment-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fullName">Full Name *</label>
                            <input type="text" id="fullName" required placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input type="email" id="email" required placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" required placeholder="Enter your phone number">
                        </div>
                        <div class="form-group">
                            <label for="service">Select Service *</label>
                            <select id="service" required>
                                <option value="">Choose a service</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="doctor">Select Doctor *</label>
                            <select id="doctor" required>
                                <option value="">Choose a doctor</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="date">Preferred Date *</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label for="time">Preferred Time *</label>
                            <input type="time" id="time" required>
                        </div>
                        <div class="form-group full-width">
                            <label for="notes">Additional Notes</label>
                            <textarea id="notes" rows="4" placeholder="Any specific concerns or information?"></textarea>
                        </div>
                    </div>
                    <div class="text-center" style="margin-top: 20px;">
                        <button type="submit" class="btn btn-primary" style="width: 200px;">Book Now</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Modern Clinic. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('appointment-form');
            const serviceSelect = document.getElementById('service');
            const doctorSelect = document.getElementById('doctor');

            // Populate Dropdowns
            const services = Storage.get(STORAGE_KEYS.SERVICES);
            const doctors = Storage.get(STORAGE_KEYS.DOCTORS);

            serviceSelect.innerHTML += services.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
            doctorSelect.innerHTML += doctors.map(d => `<option value="${d.name}">${d.name}</option>`).join('');

            // Handle URL Parameters
            const urlParams = new URLSearchParams(window.location.search);
            const serviceId = urlParams.get('service');
            const doctorId = urlParams.get('doctor');

            if (serviceId) {
                const s = services.find(x => x.id == serviceId);
                if (s) serviceSelect.value = s.name;
            }
            if (doctorId) {
                const d = doctors.find(x => x.id == doctorId);
                if (d) doctorSelect.value = d.name;
            }

            // Form Submission
            form.addEventListener('submit', (e) => {
                e.preventDefault();

                const appointment = {
                    fullName: document.getElementById('fullName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    service: serviceSelect.value,
                    doctor: doctorSelect.value,
                    date: document.getElementById('date').value,
                    time: document.getElementById('time').value,
                    notes: document.getElementById('notes').value,
                    status: 'Pending',
                    createdAt: new Date().toISOString()
                };

                Storage.save(STORAGE_KEYS.APPOINTMENTS, appointment);
                
                showToast('Appointment booked successfully!', 'success');
                form.reset();

                // Redirect after success
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            });
        });
    </script>
</body>
</html>

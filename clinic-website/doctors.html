<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Doctors | Modern Clinic</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .page-header {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('https://images.unsplash.com/photo-1551076805-e1869033e561?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 0;
            text-align: center;
        }
        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .doctor-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            text-align: center;
        }
        .doctor-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }
        .doctor-img {
            height: 300px;
            overflow: hidden;
        }
        .doctor-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .doctor-info {
            padding: 25px;
        }
        .doctor-info h3 {
            margin-bottom: 5px;
            color: var(--dark-blue);
        }
        body.dark-mode .doctor-info h3 { color: white; }
        .doctor-specialty {
            color: var(--medical-blue);
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
        }
        .doctor-meta {
            font-size: 14px;
            color: var(--gray-500);
            margin-bottom: 20px;
        }
        .doctor-meta p {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo"><span>🏥</span> ModernClinic</a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="doctors.html" class="active">Doctors</a></li>
                    <li><a href="news.html">News</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <span class="theme-toggle">🌙</span>
                    <a href="appointments.html" class="btn btn-primary">Book Now</a>
                    <span class="mobile-menu-btn">☰</span>
                </div>
            </nav>
        </div>
    </header>

    <div class="page-header">
        <div class="container">
            <h1>Meet Our Specialists</h1>
            <p>Our team of expert doctors is here to provide you with the best medical care.</p>
        </div>
    </div>

    <section class="doctors-section">
        <div class="container">
            <div class="doctors-grid" id="doctors-list">
                <!-- Loaded from Storage -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Modern Clinic. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const doctors = Storage.get(STORAGE_KEYS.DOCTORS);
            const list = document.getElementById('doctors-list');
            
            list.innerHTML = doctors.map(doc => `
                <div class="doctor-card" data-reveal="bottom">
                    <div class="doctor-img">
                        <img src="${doc.image}" alt="${doc.name}" onerror="this.src='https://images.unsplash.com/photo-1537368910025-700350fe46c7?auto=format&fit=crop&w=400&q=80'">
                    </div>
                    <div class="doctor-info">
                        <h3>${doc.name}</h3>
                        <span class="doctor-specialty">${doc.specialty}</span>
                        <div class="doctor-meta">
                            <p><strong>Exp:</strong> ${doc.experience}</p>
                            <p><strong>Schedule:</strong> ${doc.schedule}</p>
                        </div>
                        <a href="appointments.html?doctor=${doc.id}" class="btn btn-outline">Book Appointment</a>
                    </div>
                </div>
            `).join('');
            
            initScrollReveal();
        });
    </script>
</body>
</html>

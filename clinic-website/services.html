<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | Modern Clinic</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .page-header {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 0;
            text-align: center;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }
        .service-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }
        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }
        .service-img {
            height: 200px;
            overflow: hidden;
        }
        .service-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .service-info {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .service-info h3 {
            margin-bottom: 10px;
            color: var(--dark-blue);
        }
        body.dark-mode .service-info h3 { color: white; }
        .service-info p {
            color: var(--gray-500);
            margin-bottom: 20px;
            flex-grow: 1;
        }
        .service-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--gray-200);
        }
        .service-fee {
            font-weight: 700;
            color: var(--medical-blue);
            font-size: 18px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo"><span>🏥</span> ModernClinic</a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html" class="active">Services</a></li>
                    <li><a href="doctors.html">Doctors</a></li>
                    <li><a href="news.html">News</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <span class="theme-toggle">🌙</span>
                    <a href="appointments.html" class="btn btn-primary">Book Now</a>
                    <span class="mobile-menu-btn">☰</span>
                </div>
            </nav>
        </div>
    </header>

    <div class="page-header">
        <div class="container">
            <h1>Our Medical Services</h1>
            <p>We offer a wide range of specialized medical services to meet your needs.</p>
        </div>
    </div>

    <section class="services-section">
        <div class="container">
            <div class="services-grid" id="services-list">
                <!-- Loaded from Storage -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Modern Clinic. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const services = Storage.get(STORAGE_KEYS.SERVICES);
            const list = document.getElementById('services-list');
            
            list.innerHTML = services.map(service => `
                <div class="service-card" data-reveal="bottom">
                    <div class="service-img">
                        <img src="${service.image}" alt="${service.name}" onerror="this.src='https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=400&q=80'">
                    </div>
                    <div class="service-info">
                        <h3>${service.name}</h3>
                        <p>${service.description}</p>
                        <div class="service-footer">
                            <span class="service-fee">Fee: ${service.fee}</span>
                            <a href="appointments.html?service=${service.id}" class="btn btn-primary">Book Now</a>
                        </div>
                    </div>
                </div>
            `).join('');
            
            initScrollReveal();
        });
    </script>
</body>
</html>
